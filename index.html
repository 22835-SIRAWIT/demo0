<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว | น้องพีท สิรวิชญ์</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --primary-blue: #0284c7;
            --accent-blue: #38bdf8;
            --dark-text: #0f172a;
            --light-text: #64748b;
            --item-bg: #f8fafc;
            --item-hover: #f0fdf4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        /* โครงสร้างการ์ดแบบแนวนอน ทันสมัยเหมือนแดชบอร์ด */
        .main-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 850px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* ฝั่งซ้าย: รูปและชื่อ */
        .sidebar {
            background: linear-gradient(180deg, #0284c7 0%, #0369a1 100%);
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%" opacity="0.05"><path d="M14 16a2 2 0 0 0-2 2v42a2 2 0 0 0 2 2h52a2 2 0 0 0 2-2V18a2 2 0 0 0-2-2H14zm2 4h48v38H16V20z" fill="white"/></svg>');
            opacity: 0.1;
        }

        .profile-img-box {
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px; /* ทรงเหลี่ยมโค้งมนสุดฮิต */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            margin-bottom: 25px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
            transform: rotate(-5deg);
            transition: transform 0.3s ease;
        }

        .main-container:hover .profile-img-box {
            transform: rotate(0deg) scale(1.05);
        }

        .sidebar h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .tag-pete {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ฝั่งขวา: ข้อมูลทั้งหมด */
        .content-panel {
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .content-panel {
                padding: 30px 20px;
            }
        }

        .panel-title {
            font-size: 1.4rem;
            color: var(--dark-text);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }

        .panel-title span {
            width: 8px;
            height: 24px;
            background: var(--primary-blue);
            border-radius: 4px;
            display: inline-block;
        }

        /* การจัดตารางข้อมูลในรูปแบบ Grid การ์ดเล็กย่อยๆ */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* การ์ดข้อมูลย่อย */
        .grid-card {
            background: var(--item-bg);
            border: 1px solid #e2e8f0;
            padding: 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .grid-card:hover {
            background: white;
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.1);
        }

        /* เต็มความกว้างสำหรับข้อมูลยาว */
        .full-width {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .full-width {
                grid-column: span 1;
            }
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            color: var(--primary-blue);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        /* เปลี่ยนสีไอคอนตามประเภท */
        .card-birthday .icon-wrapper { color: #ec4899; }
        .card-food .icon-wrapper { color: #f97316; }
        .card-subject .icon-wrapper { color: #10b981; }
        .card-friend .icon-wrapper { color: #8b5cf6; }
        .card-color .icon-wrapper { color: #0ea5e9; }

        .card-text label {
            display: block;
            font-size: 0.85rem;
            color: var(--light-text);
            font-weight: 400;
            margin-bottom: 2px;
        }

        .card-text p {
            font-size: 1.05rem;
            color: var(--dark-text);
            font-weight: 600;
        }

        /* ตกแต่งจุดสีฟ้า */
        .blue-dot-preview {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .blue-dot-preview::after {
            content: '';
            width: 14px;
            height: 14px;
            background: #3498db;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.6);
        }

        /* Footer เล็กๆ ด้านล่างการ์ด */
        .card-footer {
            margin-top: 35px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--light-text);
            border-top: 1px dashed #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="profile-img-box">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <h1>เด็กชายสิรวิชญ์<br>ตระกลบุษบง</h1>
            <div class="tag-pete">
                <i class="fa-solid fa-face-smile"></i> ชื่อเล่น: พีท
            </div>
        </div>

        <div class="content-panel">
            <h2 class="panel-title"><span></span>ข้อมูลส่วนตัวของผม</h2>
            
            <div class="info-grid">
                <div class="grid-card card-birthday">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-cake-candles"></i>
                    </div>
                    <div class="card-text">
                        <label>วันเกิด</label>
                        <p>8 มีนาคม พ.ศ. 2555</p>
                    </div>
                </div>

                <div class="grid-card card-color">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <div class="card-text">
                        <label>สีที่ชอบ</label>
                        <p class="blue-dot-preview">สีฟ้า</p>
                    </div>
                </div>

                <div class="grid-card card-subject">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-basketball"></i>
                    </div>
                    <div class="card-text">
                        <label>วิชาที่ชอบ</label>
                        <p>พละศึกษา (P.E.)</p>
                    </div>
                </div>

                <div class="grid-card card-friend">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-user-group"></i>
                    </div>
                    <div class="card-text">
                        <label>เพื่อนสนิท</label>
                        <p>มังกร</p>
                    </div>
                </div>

                <div class="grid-card card-food full-width">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-utensils"></i>
                    </div>
                    <div class="card-text">
                        <label>เมนูอาหารโปรด</label>
                        <p>กะเพราไข่ดาว <i class="fa-solid fa-fire" style="color: #ff7675; margin-left: 5px;"></i></p>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <p>สิรวิชญ์ ตระกลบุษบง &copy; 2026 | My Student Profile Card</p>
            </div>
        </div>
    </div>

</body>
</html>
