<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว | เด็กชายสิรวิชญ์ ตระกลบุษบง (พีท)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --primary-blue: #3498db;
            --dark-blue: #2c3e50;
            --light-blue: #e8f4f8;
            --gradient-blue: linear-gradient(135deg, #74b9ff, #0984e3);
            --text-color: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: #f0f7fc;
            background-image: radial-gradient(at 0% 0%, hsla(205,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(205,100%,93%,1) 0, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            max-width: 550px;
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* ส่วนหัว / แบนเนอร์ */
        .profile-header {
            background: var(--gradient-blue);
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }
