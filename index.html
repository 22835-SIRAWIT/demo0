<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การ์ดประวัติส่วนตัวนักเรียน - สิรวิชญ์ ตระกลบุษบง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #f4f4f7;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Card Container */
        .profile-card {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e1e1e6;
        }

        /* Header Section (ธีมสีดำโมเดิร์น) */
        .card-header {
            background: linear-gradient(135deg, #121212 0%, #2c2c2e 100%);
            color: #ffffff;
            padding: 40px;
            position: relative;
        }

        /* สไตล์สำหรับรูปภาพด้านบน */
        .header-image-container {
            width: 100%;
            text-align: center;
            background-color: #121212;
            padding-top: 20px;
        }

        .header-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .school-badge {
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
        }

        .student-name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .student-nickname {
            font-size: 18px;
            color: #a1a1aa;
            font-weight: 400;
        }

        /* Content Body */
        .card-body {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* Section Styling */
        .info-section {
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 16px;
            color: #121212;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #121212;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Data List Layout */
        .info-item {
            display: flex;
            margin-bottom: 14px;
            line-height: 1.6;
            font-size: 15px;
        }

        .info-label {
            color: #66666e;
            font-weight: 500;
            width: 110px;
            flex-shrink: 0;
        }

        .info-value {
            color: #1a1a1a;
            font-weight: 600;
        }

        /* Pills / Tags สำหรับวิชาและทักษะ */
        .pill-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 2px;
        }

        .pill {
            display: inline-block;
            background-color: #f4f4f7;
            color: #121212;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #e1e1e6;
        }

        .pill.dark {
            background-color: #121212;
            color: #ffffff;
            border: none;
        }

        .pill.danger {
            background-color: #fff1f2;
            color: #e11d48;
            border-color: #ffe4e6;
        }

        /* Quote Box (คติประจำใจ) */
        .quote-box {
            background: #f8f8fa;
            border-left: 4px solid #121212;
            padding: 18px 20px;
            border-radius: 0 8px 8px 0;
            margin-top: 25px;
        }

        .quote-title {
            font-size: 12px;
            color: #66666e;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quote-text {
            font-size: 15px;
            color: #121212;
            font-weight: 600;
            font-style: italic;
        }

        /* รองรับการพิมพ์และการจัดหน้าบน A4 */
        @media print {
            body {
                background-color: #ffffff;
                padding: 0;
                display: block;
            }
            @page {
                size: A4;
                margin: 20mm;
            }
            .profile-card {
                border: none;
                box-shadow: none;
                max-width: 100%;
            }
            .card-header {
                background: #121212 !important;
                color: #ffffff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .student-nickname {
                color: #a1a1aa !important;
            }
            .section-title {
                border-bottom-color: #121212 !important;
            }
            .pill {
                background-color: #f4f4f7 !important;
                color: #121212 !important;
                border-color: #e1e1e6 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .pill.dark {
                background-color: #121212 !important;
                color: #ffffff !important;
            }
            .pill.danger {
                background-color: #fff1f2 !important;
                color: #e11d48 !important;
                border-color: #ffe4e6 !important;
            }
            .
